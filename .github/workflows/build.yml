name: Build Kivy APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.8'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3 python3-pip \
          python3-setuptools \
          python3-wheel \
          build-essential \
          git \
          openjdk-8-jdk \
          python3-kivy \
          zip \
          unzip \
          python3-pyqt5

        # Install Cython
        pip install cython

    - name: Install Android Command Line Tools
      run: |
        # Create necessary directory structure
        mkdir -p $HOME/android-sdk/cmdline-tools/latest

        # Download and unzip command-line tools into the correct directory
        wget https://dl.google.com/android/repository/commandlinetools-linux-8512546_latest.zip -O cmdline-tools.zip
        unzip cmdline-tools.zip -d $HOME/android-sdk/cmdline-tools/latest
        rm cmdline-tools.zip
        
        # Move the extracted files to the correct location
        mv $HOME/android-sdk/cmdline-tools/latest/cmdline-tools/* $HOME/android-sdk/cmdline-tools/latest/
        rmdir $HOME/android-sdk/cmdline-tools/latest/cmdline-tools # Remove the empty directory

        # Set up environment variables for Android SDK
        export ANDROID_HOME=$HOME/android-sdk
        export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH
        
        # Accept licenses and install platform tools
        yes | sdkmanager --licenses
        sdkmanager "platform-tools" "platforms;android-30" "build-tools;30.0.3"

    - name: Install Buildozer
      run: |
        pip install --upgrade pip
        pip install buildozer

    - name: Initialize buildozer.spec
      run: |
        cd . # Current directory
        buildozer init

    - name: Build APK
      run: |
        cd . # Current directory
        buildozer -v android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: kivy-apk
        path: bin/*.apk # APK output path
