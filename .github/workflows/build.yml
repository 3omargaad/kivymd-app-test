name: Build Kivy APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.8'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3 python3-pip \
          python3-setuptools \
          python3-wheel \
          build-essential \
          git \
          openjdk-8-jdk \
          python3-kivy \
          zip \
          unzip \
          python3-pyqt5

    - name: Install Buildozer
      run: |
        pip install --upgrade pip
        pip install buildozer

    - name: Initialize buildozer.spec
      run: |
        cd path/to/your/app # Change to your application directory
        buildozer init

    - name: Build APK
      run: |
        cd path/to/your/app # Change to your application directory
        buildozer -v android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: kivy-apk
        path: path/to/your/app/bin/*.apk # Change to your APK output path
